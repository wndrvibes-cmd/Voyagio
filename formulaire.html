<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer ton voyage</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#0f172a,#1e293b);
  color: white;
}

.section {
  max-width: 500px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

h2 { margin-bottom: 10px; }

.subtitle {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 20px;
}

.plan-badge {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 25px;
  font-size: 13px;
  margin-bottom: 15px;
  font-weight: bold;
}

form {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
}

input, select, textarea {
  width: 100%;
  padding: 16px;
  margin-bottom: 15px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
}

.btn-main {
  width: 100%;
  padding: 18px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  background: linear-gradient(135deg,#ff7a18,#ff3cac);
  color: white;
}

.step { display:none; }
.step.active { display:block; }

.security {
  font-size: 12px;
  color: #aaa;
}

@keyframes spin {
0% { transform: rotate(0deg); }
100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="section">

<div id="planBadge" class="plan-badge"></div>

<h2>✨ Ton voyage commence ici</h2>
<p class="subtitle">Réponds en 30 secondes et reçois ton itinéraire personnalisé</p>

<div style="height:6px;background:#222;border-radius:10px;margin-bottom:20px;">
  <div id="progressBar" style="height:100%;width:33%;background:linear-gradient(90deg,#ff7a18,#ff3cac);"></div>
</div>

<form id="travelForm">

<input type="hidden" id="planInput">

<!-- STEP 1 -->
<div class="step active">

<input type="text" placeholder="Ton nom" required>
<input type="email" placeholder="Ton email" required>

<select required>
<option value="">🌍 Destination</option>
<option>🎯 Surprise-moi</option>

<optgroup label="🏝️ Paradis">
<option>Bali</option><option>Maldives</option><option>Seychelles</option>
<option>Île Maurice</option><option>Zanzibar</option><option>Bahamas</option>
<option>Hawaï</option><option>Fidji</option><option>Polynésie Française</option>
</optgroup>

<optgroup label="🏙️ Villes & luxe">
<option>Dubaï</option><option>Paris</option><option>New York</option>
<option>Tokyo</option><option>Singapour</option><option>Los Angeles</option>
<option>Monaco</option><option>Miami</option><option>Londres</option>
</optgroup>

<optgroup label="🌎 Monde">
<option>Mexique</option><option>Brésil</option><option>Colombie</option>
<option>Thaïlande</option><option>Vietnam</option><option>Grèce</option>
<option>Italie</option><option>Espagne</option><option>Portugal</option>
</optgroup>

</select>

<button type="button" onclick="nextStep()" class="btn-main">Continuer →</button>

</div>

<!-- STEP 2 -->
<div class="step">

<input type="number" placeholder="Budget €">
<input type="number" placeholder="Personnes">

<select><option>Durée</option><option>5 jours</option><option>7 jours</option></select>

<select><option>Type de voyage</option><option>Chill</option><option>Luxe</option></select>

<button type="button" onclick="nextStep()" class="btn-main">Continuer →</button>

</div>

<!-- STEP 3 -->
<div class="step" id="premiumStep">

<textarea placeholder="Ton voyage idéal..."></textarea>

<div id="premiumQuestions" style="display:none;">
<select><option>Hébergement</option><option>Luxe</option></select>
</div>

<div id="vipQuestions" style="display:none;">
<textarea placeholder="Expériences exclusives..."></textarea>
</div>

<p class="security">🔒 Données sécurisées</p>

<button type="submit" class="btn-main">🚀 Recevoir mon voyage</button>

</div>

</form>

<!-- IA SCREEN -->
<div id="loadingScreen" style="display:none;text-align:center;padding:60px;">
<h2>✨ Création de ton voyage...</h2>
<p id="loadingText">Analyse...</p>
<div style="width:60px;height:60px;border:4px solid #222;border-top:4px solid #ff3cac;border-radius:50%;animation:spin 1s linear infinite;margin:auto;"></div>
</div>

</div>

<script>
let step = 0;
const steps = document.querySelectorAll(".step");
const progress = document.getElementById("progressBar");

function showStep(i){
  steps.forEach(s => s.classList.remove("active"));
  steps[i].classList.add("active");
  progress.style.width = ((i+1)/steps.length)*100 + "%";
}

function nextStep(){
  if(step < steps.length-1){ step++; showStep(step); }
}

showStep(0);

/* PLAN */
const plan = new URLSearchParams(window.location.search).get("plan");
const badge = document.getElementById("planBadge");

if(plan === "basic"){
  badge.innerText = "🟢 BASIC";
  document.getElementById("premiumStep").style.display = "none";
}
if(plan === "premium"){
  badge.innerText = "🔥 PREMIUM";
  document.getElementById("premiumQuestions").style.display = "block";
}
if(plan === "vip"){
  badge.innerText = "💎 VIP";
  document.getElementById("premiumQuestions").style.display = "block";
  document.getElementById("vipQuestions").style.display = "block";
}

/* IA LOADING */
document.getElementById("travelForm").addEventListener("submit", function(e){
  e.preventDefault();
  this.style.display = "none";
  document.getElementById("loadingScreen").style.display = "block";

  const stepsText = [
    "Analyse...",
    "Recherche...",
    "Optimisation...",
    "Finalisation..."
  ];

  let i = 0;
  const text = document.getElementById("loadingText");

  const interval = setInterval(()=>{
    if(i < stepsText.length){
      text.innerText = stepsText[i++];
    } else {
      clearInterval(interval);
      setTimeout(()=> alert("🎉 Voyage prêt !"), 1000);
    }
  },1500);
});
</script>

</body>
</html>
