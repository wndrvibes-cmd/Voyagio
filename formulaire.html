<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer ton voyage</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") no-repeat center/cover;
  color: white;

  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* OVERLAY PREMIUM */
form {
  position: relative;
  z-index: 2;
}

.section::before {
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background: radial-gradient(circle, rgba(255,120,50,0.3), transparent);
  top:50%;
  left:50%;
  transform: translate(-50%, -50%);
  filter: blur(80px);
  z-index:0;
}

/* CONTAINER */
.section {
  width: 100%;
  max-width: 500px;
  padding: 80px 20px;
  text-align: center;
}

/* TITRES */
h2 {
  margin-bottom: 10px;
  font-size: 26px;
  font-weight: 700;
  color: white;
  text-shadow: 0 5px 20px rgba(0,0,0,0.8);
}

/* TEXTE */
.subtitle {
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  margin-bottom: 20px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.7);
}

/* BADGE PLAN */
.plan-badge {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 25px;
  font-size: 13px;
  margin-bottom: 15px;
  font-weight: bold;
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

/* FORM */
  input, select, textarea {
  width: 100%;
  padding: 16px;
  margin-bottom: 15px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: white;
  box-sizing: border-box;
}

/* INPUTS */
form {
  background: rgba(15,15,25,0.75);
  padding: 30px 25px;
  border-radius: 25px;
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
}

input:focus, select:focus, textarea:focus {
  outline: none;
  background: rgba(255,255,255,0.08);
}

/* BOUTON */
.btn-main {
  width: 100%;
  padding: 18px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  background: linear-gradient(135deg,#ff7a18,#ff3cac);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn-main:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 30px rgba(255,122,24,0.5);
}

/* PROGRESS BAR */
.progress-container {
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
}

#progressBar {
  height:100%;
  width:33%;
  background:linear-gradient(90deg,#ff7a18,#ff3cac);
}

/* STEPS */
.step { display:none; }
.step.active { display:block; }

/* TEXTE BAS */
.security {
  font-size: 12px;
  color: #aaa;
} 
.logo {
  width: 160px; 
  margin-bottom: 20px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  filter: drop-shadow(0 10px 25px rgba(0,0,0,0.6));
}
.footer {
  margin-top: 40px;
  text-align: center;
  color: #aaa;
  font-size: 13px;
  opacity: 0.7;
}

.footer p {
  margin: 5px 0;
} 
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.section {
  flex: 1;
} 
.footer {
  margin-top: 60px;
  padding: 30px 20px;
  text-align: center;
  position: relative;
}

.footer::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.6); /* 👈 fond sombre */
  backdrop-filter: blur(6px);  /* 👈 effet glass */
  z-index:0;
  border-radius: 20px;
}

.footer-content {
  position: relative;
  z-index: 1;
  color: #ddd;
  font-size: 13px;
}

.footer p {
  margin: 6px 0;
} 

</style>
</head>

<body>

<div class="section">

<img src="https://www.image2url.com/r2/default/images/1776393053480-0cba0804-7b75-41ab-ae09-cc32e5ea10dc.png" class="logo">

<div id="planBadge" class="plan-badge"></div>

<h2>✨ Ton voyage commence ici</h2>
<p class="subtitle">Réponds en 30 secondes et reçois ton itinéraire personnalisé</p>

<div style="height:6px;background:#222;border-radius:10px;margin-bottom:20px;">
  <div id="progressBar" style="height:100%;width:33%;background:linear-gradient(90deg,#ff7a18,#ff3cac);"></div>
</div>

<form id="travelForm">

<input type="hidden" name="plan" id="planInput">

<!-- STEP 1 -->
<div class="step active">

<input type="text" name="name" placeholder="Ton nom" required>
<input type="email" name="email" placeholder="Ton email" required>

<select name="destination" required>
<option value="">🌍 Destination</option>
<option>🎯 Surprise-moi</option>

<optgroup label="🏝️ Paradis">
<option>Bali</option><option>Maldives</option><option>Seychelles</option>
<option>Île Maurice</option><option>Zanzibar</option><option>Bahamas</option>
<option>Hawaï</option><option>Fidji</option><option>Polynésie Française</option>
<option>Bora Bora</option><option>Cap Vert</option>
</optgroup>

<optgroup label="🏙️ Villes & luxe">
<option>Dubaï</option><option>Paris</option><option>New York</option>
<option>Tokyo</option><option>Singapour</option><option>Los Angeles</option>
<option>Monaco</option><option>Miami</option><option>Londres</option>
<option>Doha</option><option>Hong Kong</option>
</optgroup>

<optgroup label="🌎 Monde">
<option>Mexique</option><option>Brésil</option><option>Colombie</option>
<option>Thaïlande</option><option>Vietnam</option><option>Grèce</option>
<option>Italie</option><option>Espagne</option><option>Portugal</option>
<option>Canada</option><option>Australie</option><option>Japon</option>
</optgroup>

</select>

<button type="button" onclick="nextStep()" class="btn-main">Continuer →</button>

</div>

<!-- STEP 2 -->
<div class="step">

<input type="number" name="budget" placeholder="Budget €">
<input type="number" name="people" placeholder="Personnes">

<select name="duration">
<option>Durée</option>
<option>3 jours</option>
<option>5 jours</option>
<option>7 jours</option>
<option>10 jours</option>
<option>2 semaines</option>
<option>3 semaines</option>
<option>1 mois</option>
</select>

<select name="style">
<option>Type de voyage</option>
<option>Chill & détente</option>
<option>Aventure</option>
<option>Luxe</option>
<option>Road trip</option>
<option>Backpack</option>
<option>Romantique</option>
<option>Famille</option>
<option>Solo</option>
<option>Mix</option>
</select>

<button type="button" onclick="nextStep()" class="btn-main">Continuer →</button>

</div>

<!-- STEP 3 -->
<div class="step">

<textarea name="details" placeholder="Ton voyage idéal..."></textarea>

<p class="security">🔒 Données sécurisées</p>

<button type="submit" class="btn-main">🚀 Recevoir mon voyage</button>

</div>

</form>

<div id="loadingScreen" style="display:none;text-align:center;padding:60px;">
<h2>✨ Création de ton voyage...</h2>
<p id="loadingText">Analyse...</p>
</div>

</div>
</form>

<!-- 👇 AJOUTE ICI -->
<<footer class="footer">
  <div class="footer-content">
    <p>© 2026 Voyagio — Tous droits réservés</p>
    <p>Contact : hello.voyagio@gmail.com</p>
  </div>

<script>
let step = 0;
const steps = document.querySelectorAll(".step");
const progress = document.getElementById("progressBar");

function showStep(i){
  steps.forEach(s => s.classList.remove("active"));
  steps[i].classList.add("active");
  progress.style.width = ((i+1)/steps.length)*100 + "%";
}

function nextStep(){
  const currentStep = steps[step];
  const inputs = currentStep.querySelectorAll("input, select, textarea");

  for(let input of inputs){
    if(!input.checkValidity()){
      input.reportValidity();
      return;
    }
  }

  if(step < steps.length - 1){
    step++;
    showStep(step);
  }
}

showStep(0);

/* PLAN */
const params = new URLSearchParams(window.location.search);
const selectedPlan = params.get("plan") || "PREMIUM";

document.getElementById("planInput").value = selectedPlan;

const badge = document.getElementById("planBadge");

if(selectedPlan === "BASIC"){
  badge.innerHTML = "🟢 BASIC";
  badge.style.background = "#00ff88";
}

if(selectedPlan === "PREMIUM"){
  badge.innerHTML = "🔥 PREMIUM";
  badge.style.background = "#ff7a18";
}

if(selectedPlan === "VIP"){
  badge.innerHTML = "💎 VIP";
  badge.style.background = "#ff3cac";
}

/* ENVOI ZAPIER */
document.getElementById("travelForm").addEventListener("submit", function(e){

  e.preventDefault();

  const data = {
    plan: document.getElementById("planInput").value,
    name: document.querySelector('[name="name"]').value,
    email: document.querySelector('[name="email"]').value,
    destination: document.querySelector('[name="destination"]').value,
    budget: document.querySelector('[name="budget"]').value,
    people: document.querySelector('[name="people"]').value,
    duration: document.querySelector('[name="duration"]').value,
    style: document.querySelector('[name="style"]').value,
    details: document.querySelector('[name="details"]').value
  };

  fetch("https://hooks.zapier.com/hooks/catch/27279299/uj5n35z/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  // UI loading
  document.getElementById("travelForm").style.display = "none";
  document.getElementById("loadingScreen").style.display = "block";

  /* ANIMATION TEXTE */
  const texts = [
    "Analyse de tes préférences...",
    "Recherche des meilleures destinations...",
    "Création de ton itinéraire...",
    "Optimisation selon ton budget...",
    "Finalisation de ton voyage..."
  ];

  let i = 0;
  const loadingText = document.getElementById("loadingText");

  const interval = setInterval(() => {
    if(i < texts.length){
      loadingText.innerHTML = texts[i];
      i++;
    }
  }, 1500);

  /* FIN (fake succès pour l’instant) */
  setTimeout(() => {
    clearInterval(interval);

    document.getElementById("loadingScreen").innerHTML = `
      <h2>🎉 Ton voyage est prêt !</h2>
      <p>Tu vas recevoir ton itinéraire par email dans quelques instants ✈️</p>
    `;
  }, 8000);

});
</script>

</body>
</html>
