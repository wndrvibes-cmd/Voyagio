<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer ton voyage</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#0f172a,#1e293b);
  color: white;
}

/* SECTION */
.section {
  max-width: 500px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

/* TITRE */
h2 {
  margin-bottom: 10px;
  font-size: 28px;
}

.subtitle {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 25px;
}

/* BADGE */
.badge {
  display: inline-block;
  background: linear-gradient(90deg,#ff7a18,#ff3cac);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  margin-bottom: 15px;
}

/* FORM */
form {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 25px;

  backdrop-filter: blur(15px);

  border: 1px solid rgba(255,255,255,0.05);

  box-shadow:
    0 0 20px rgba(255,60,172,0.15),
    0 0 60px rgba(0,0,0,0.8);
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 16px;
  margin-bottom: 15px;

  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.05);

  background: rgba(255,255,255,0.03);
  color: white;

  font-size: 14px;

  transition: 0.3s;
}

/* FOCUS (effet wow) */
input:focus, select:focus, textarea:focus {
  outline: none;
  border: 1px solid #ff3cac;
  box-shadow: 0 0 15px rgba(255,60,172,0.4);
}

/* LABEL */
label {
  display: block;
  text-align: left;
  margin-bottom: 8px;
  margin-top: 10px;
  color: #ddd;
}

/* BUTTON */
.btn-main {
  width: 100%;
  padding: 18px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  color: white;
  cursor: pointer;

  background: linear-gradient(135deg,#ff7a18,#ff3cac);

  box-shadow:
    0 0 20px rgba(255,122,24,0.6),
    0 0 40px rgba(255,60,172,0.4);

  transition: 0.3s;
}

.btn-main:hover {
  transform: scale(1.05);
}

/* TEXTE SÉCURITÉ */
.security {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div id="formSection">

<div class="section">

<div class="badge">🔥 Accès client premium</div>

<h2>✨ Ton voyage commence ici</h2>

<p class="subtitle">
Réponds en 30 secondes et reçois ton itinéraire sur-mesure
</p>

<form id="travelForm">

<input type="text" name="name" placeholder="Ton nom" required>
<input type="email" name="email" placeholder="Ton email" required>

<label>🌍 Destination</label>

<select name="destination" required>

<option value="">Choisis une destination</option>

<optgroup label="🏝️ Paradis">
<option>Bali</option>
<option>Maldives</option>
<option>Seychelles</option>
<option>Île Maurice</option>
<option>Zanzibar</option>
<option>Bahamas</option>
<option>Hawaï</option>
</optgroup>

<optgroup label="🏙️ Villes & luxe">
<option>Dubaï</option>
<option>Paris</option>
<option>New York</option>
<option>Tokyo</option>
<option>Singapour</option>
<option>Los Angeles</option>
<option>Monaco</option>
</optgroup>

<optgroup label="🏜️ Aventure">
<option>Maroc</option>
<option>Jordanie (Petra)</option>
<option>Égypte</option>
<option>Namibie</option>
</optgroup>

<optgroup label="🏔️ Nature">
<option>Suisse</option>
<option>Canada</option>
<option>Islande</option>
<option>Norvège</option>
<option>Népal</option>
</optgroup>

<optgroup label="🌴 Asie">
<option>Thaïlande</option>
<option>Vietnam</option>
<option>Indonésie</option>
<option>Philippines</option>
<option>Sri Lanka</option>
</optgroup>

<optgroup label="🏛️ Europe">
<option>Grèce</option>
<option>Italie</option>
<option>Espagne</option>
<option>Portugal</option>
<option>Croatie</option>
<option>Turquie</option>
</optgroup>

<optgroup label="🌎 Amérique">
<option>Mexique</option>
<option>Brésil</option>
<option>Pérou</option>
<option>Colombie</option>
<option>Californie</option>
</optgroup>

</select>

<p style="color:#ff7a18; font-size:13px;">
🔥 Les destinations tendances : Bali, Maldives, Dubaï
</p>

<input type="number" name="budget" placeholder="Budget €">
<input type="number" name="people" placeholder="Personnes">

<select name="duration">
<option>5 jours</option>
<option>7 jours</option>
<option>10 jours</option>
</select>

<textarea name="details" placeholder="Ton voyage idéal..."></textarea>

<p class="security">
🔒 Données sécurisées • réponse sous 24h • sans engagement
</p>

<button type="submit" class="btn-main">🚀 Recevoir mon voyage</button>

</form>
</div>

</div>

</body>
</html>
