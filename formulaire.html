<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer ton voyage</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg,#0f172a,#1e293b);
  color: white;
}

/* SECTION */
.section {
  max-width: 500px;
  margin: auto;
  padding: 50px 20px;
  text-align: center;
}

/* TITRE */
h2 {
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  font-size: 14px;
  margin-bottom: 20px;
}

/* BADGE PLAN */
.plan-badge {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 25px;
  font-size: 13px;
  margin-bottom: 15px;
  font-weight: bold;
}

/* FORM */
form {
  background: rgba(0,0,0,0.75);
  padding: 25px;
  border-radius: 25px;
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.05);
  transition: 0.3s;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 16px;
  margin-bottom: 15px;
  border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.03);
  color: white;
  font-size: 14px;
  transition: 0.3s;
}

/* FOCUS */
input:focus, select:focus, textarea:focus {
  outline: none;
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

/* LABEL */
label {
  display: block;
  text-align: left;
  margin-bottom: 8px;
  margin-top: 10px;
  color: #ddd;
}

/* BUTTON */
.btn-main {
  width: 100%;
  padding: 18px;
  border-radius: 50px;
  border: none;
  font-weight: bold;
  font-size: 16px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.btn-main:hover {
  transform: scale(1.05);
}

/* TEXTE */
.security {
  font-size: 12px;
  color: #aaa;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<div class="section">

<div id="planBadge" class="plan-badge"></div>

<h2>✨ Ton voyage commence ici</h2>

<p class="subtitle">
Réponds en 30 secondes et reçois ton itinéraire personnalisé
</p>

<form id="travelForm">

<!-- PLAN CACHÉ -->
<input type="hidden" name="plan" id="planInput">

<input type="text" name="name" placeholder="Ton nom" required>
<input type="email" name="email" placeholder="Ton email" required>

<label>🌍 Destination</label>

<select name="destination" required>

<option value="">Choisis une destination</option>

<optgroup label="🏝️ Paradis">
<option>Bali</option>
<option>Maldives</option>
<option>Seychelles</option>
<option>Île Maurice</option>
<option>Zanzibar</option>
<option>Bahamas</option>
<option>Hawaï</option>
</optgroup>

<optgroup label="🏙️ Villes & luxe">
<option>Dubaï</option>
<option>Paris</option>
<option>New York</option>
<option>Tokyo</option>
<option>Singapour</option>
<option>Los Angeles</option>
<option>Monaco</option>
</optgroup>

</select>

<p style="color:#ff7a18; font-size:13px;">
🔥 Destinations tendances : Bali, Maldives, Dubaï
</p>

<input type="number" name="budget" placeholder="Budget €">
<input type="number" name="people" placeholder="Personnes">

<select name="duration">
<option>5 jours</option>
<option>7 jours</option>
<option>10 jours</option>
</select>

<textarea name="details" placeholder="Ton voyage idéal..."></textarea>

<p class="security">
🔒 Données sécurisées • réponse rapide • sans engagement
</p>

<button type="submit" id="submitBtn" class="btn-main">
🚀 Recevoir mon voyage
</button>

</form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const plan = params.get("plan");

const badge = document.getElementById("planBadge");
const btn = document.getElementById("submitBtn");
const form = document.getElementById("travelForm");

document.getElementById("planInput").value = plan;

/* STYLES PAR PLAN */
if(plan === "basic"){
  badge.innerText = "🟢 Offre BASIC";
  badge.style.background = "#00ff88";
  badge.style.color = "#000";

  btn.style.background = "#00ff88";
  btn.style.boxShadow = "0 0 20px #00ff88";

  form.style.boxShadow = "0 0 30px rgba(0,255,136,0.3)";
}

if(plan === "premium"){
  badge.innerText = "🔥 Offre PREMIUM";
  badge.style.background = "#ff7a18";

  btn.style.background = "#ff7a18";
  btn.style.boxShadow = "0 0 20px #ff7a18";

  form.style.boxShadow = "0 0 30px rgba(255,122,24,0.4)";
}

if(plan === "vip"){
  badge.innerText = "💎 Offre VIP";
  badge.style.background = "#ff3cac";

  btn.style.background = "#ff3cac";
  btn.style.boxShadow = "0 0 20px #ff3cac";

  form.style.boxShadow = "0 0 40px rgba(255,60,172,0.5)";
}

/* SI PAS DE PLAN */
if(!plan){
  badge.innerText = "✨ Offre personnalisée";
  badge.style.background = "linear-gradient(90deg,#ff7a18,#ff3cac)";
}
</script>

</body>
</html>
