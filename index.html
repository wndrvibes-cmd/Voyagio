<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voyagio ✈️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
margin: 0;
font-family: 'Poppins', sans-serif;
background: #0a0a0a;
color: white;
text-align: center;
}

/* HERO */
.hero {
padding: 80px 20px;
}

.logo {
width: 120px;
margin-bottom: 20px;
}

h1 {
font-size: 40px;
margin: 10px 0;
}

.subtitle {
color: #aaa;
margin-bottom: 20px;
}

.btn-main {
padding: 15px 30px;
border-radius: 40px;
background: linear-gradient(135deg,#ff7a18,#ff3cac);
border: none;
color: white;
font-weight: bold;
cursor: pointer;
font-size: 16px;
}

/* DESTINATIONS */
.grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
padding: 20px;
}

.card-img {
border-radius: 15px;
overflow: hidden;
}

.card-img img {
width: 100%;
height: 120px;
object-fit: cover;
}

/* SECTION */
.section {
padding: 40px 20px;
}

/* PRICING */
.card {
background: #111;
padding: 20px;
margin: 10px;
border-radius: 15px;
cursor: pointer;
}

.card.active {
border: 2px solid orange;
}

.card span {
color: orange;
font-size: 20px;
}

/* FORM */
form {
display: flex;
flex-direction: column;
gap: 10px;
padding: 20px;
}

input, select, textarea {
padding: 12px;
border-radius: 10px;
border: none;
background: #161616;
color: white;
}

</style>
</head>

<body>

<div class="hero">

<h1>Voyagio ✈️</h1>
<p class="subtitle">Ton voyage commence ici</p>

<button class="btn-main">Créer mon voyage 🚀</button>

</div>

<!-- DESTINATIONS -->
<div class="section">
<h2>Destinations 🌍</h2>

<div class="grid">

<div class="card-img">
<img src="https://images.pexels.com/photos/35057424/pexels-photo-35057424.jpeg">
</div>

<div class="card-img">
<img src="https://images.pexels.com/photos/9394269/pexels-photo-9394269.jpeg">
</div>

<div class="card-img">
<img src="https://images.pexels.com/photos/5247279/pexels-photo-5247279.jpeg">
</div>

<div class="card-img">
<img src="https://images.pexels.com/photos/161815/santorini-oia-greece-water-161815.jpeg">
</div>

</div>
</div>

<!-- PRICING -->
<div class="section">
<h2>Choisis ton offre ✨</h2>

<div class="card" onclick="selectPlan('BASIC', this)">
<h3>BASIC</h3>
<span>9€</span>
</div>

<div class="card" onclick="selectPlan('PREMIUM', this)">
<h3>PREMIUM 🔥</h3>
<span>19€</span>
</div>

<div class="card" onclick="selectPlan('VIP', this)">
<h3>VIP 💎</h3>
<span>29€</span>
</div>

<button id="payBtn" class="btn-main">Choisir</button>

</div>

<!-- FORM -->
<div class="section">
<h2>Créer ton voyage ✈️</h2>

<form id="travelForm">

<input type="text" name="name" placeholder="Ton nom" required>
<input type="email" name="email" placeholder="Ton email" required>

<select name="destination">
<option>Bali</option>
<option>Maldives</option>
<option>Dubaï</option>
<option>Thaïlande</option>
</select>

<textarea name="details" placeholder="Décris ton voyage"></textarea>

<button type="submit" class="btn-main">Envoyer 🚀</button>

</form>

</div>

<script>

let selectedPlan = null;

function selectPlan(plan, element){
selectedPlan = plan;

document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
element.classList.add('active');

const btn = document.getElementById("payBtn");

if(plan === "BASIC") btn.innerText = "Payer 9€";
if(plan === "PREMIUM") btn.innerText = "Payer 19€";
if(plan === "VIP") btn.innerText = "Payer 29€";
}

document.getElementById("payBtn").onclick = function(){

if(!selectedPlan){
alert("Choisis une offre");
return;
}

alert("Paiement simulé 💸");
}

document.getElementById("travelForm").addEventListener("submit", function(e){
e.preventDefault();
alert("Demande envoyée ✈️");
this.reset();
});

</script>

</body>
</html>
